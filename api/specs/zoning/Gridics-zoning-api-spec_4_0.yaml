     | Buildings[\*].Envelope.MaxIndustrialAreaAllowed            | Maximum Industrial Uses Allowed              | The maximum area (square feet) of Industrial uses allowed.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              | integer          | ft2                  |
     | Buildings[\*].Envelope.MaxCivicAreaAllowed                 | Maximum Civic Uses Allowed                   | The maximum area (square feet) of civic uses allowed.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   | integer          | ft2                  |
