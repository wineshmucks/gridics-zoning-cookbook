openapi: 3.0.1
info:
  version: 0.0.1
  title: Zoning API
  description: |-
    # Overview
    
     The Zoning API allows users to retrieve Gridics' lot-specific calibrated zoning information. Depending on the depth of calibration, the zoning information provided by the API reflects base zone regulations, overlays, frontages, and use conditions that may apply within various parts of a municipal or county jurisdiction.
     
     The API is a REST API that responds in JSON format.
    
     <div class="alert alert-info border-0 rounded-sm alert-dismissible" role="alert">
     <strong>Protocol:</strong> HTTPS v1.1<br>
     <strong>Method:</strong> GET<br>
     <strong>URL:</strong> <a href="https://api.gridics.com" target="_blank">https://api.gridics.com</a><br>
     <strong>Example:</strong> <a href="https://api.gridics.com/v1/property-record?state_env=fl&address=444%20BRICKELL%20ST&zipCode=33131" target="_blank">https://api.gridics.com/v1/property-record?state_env=fl&address=444%20BRICKELL%20ST&zipCode=33131</a><br>
     <strong>Response Format:</strong> JSON
     </div>
   
     # User Guide
     ## Get Access
    
     You must request credentials for any applications you develop
     1. Click <a href="https://developer.gridics.com/user/apps" target="_blank">Apps</a> on the portal website.
     2. Click the Add App button. The “Add App” form appears.
     3. Complete the Add App form.
     4. Select the API you want to access.<br>**NOTE:** Apps labeled **DEMO** are approved instantly and are intended for integration testing (300 API call limit).

     5. When you have completed the form, click the Add App button.
    
     ## API Keys

     Every call to the API requires a subscription key. This key needs to be passed through a request header (x-api-key).

     To view your API subscription keys:
     1. From the <a href="https://developer.gridics.com/user/apps" target="_blank">Apps</a> screen, click on the name of your app. The Details screen appears.
     2. If you have access to more than one API, click the name of the relevant API.<br>**NOTE:** The APIs are listed under the “Credentials” section.

     3. Click the **Eyeball** icon next to the *Consumer Key*. The *Consumer Key* appears.
     4. This is the Key you will use when Authenticating your API call. See Authentication below.

     ## Environments
    
     The addressable API base URL/URI environments are:
    
     | Environment | Description |
     | --- | --- |
     | https://api.gridics.com/v1/property-record| Sandbox and production environment |

     ## Rate limits
    
     Rate limits protect the Gridics infrastructure from suspicious requests that exceed defined thresholds.
     
     DEMO APIs are limited to **50 calls per second** and **300 lifetime calls**.
  
     Production APIs are limited to **50 calls per second** and **3000 calls per month**.
  
     Additional rate limits are available and granted according to your specific use case. If you would like additional limits, please <a href="https://developer.gridics.com/contact" target="_blank">Contact Us</a> with more details.

     ## Request Production Access
    
     All production API calls are billed at their respective rates, please test with DEMO APIs before requesting Production Access.
    
     1. Create a new App for production. By doing so, you will get a different API-Key which you can use for your production environment.
     1. To get production access, it is important that both your account and App details are registered correctly.
     1. Subscribe to the API products you want to use in the production environment.
     1. Submit your <a href="https://developer.gridics.com/request-production-access" target="_blank">request for production access</a>. Depending on the API, our team will contact you to discuss the details of your request.
     1. If you desire to license the Services from Gridics for production or other commercial purposes, the parties shall enter into a separate mutually acceptable agreement for such purpose.
     1. Once approved, you are ready to use our API in a live environment.
    
     ## Authentication
     All Gridics APIs use API keys to authenticate requests. You can view and manage your API keys in the Developer Portal under the <a href="https://developer.gridics.com/user/apps" target="_blank">Apps</a> section.

     Your API keys carry usage statistics, so be sure to keep them secure. Don't share your secret API keys in publicly accessible areas such as GitHub, client-side code, and so forth.
    
     Provide your API key as the ***x-api-key*** header.

     You must make all API calls over <a href="https://en.wikipedia.org/wiki/HTTP_Secure" target="_blank">HTTPS</a>. Calls that you make over plain HTTP will fail. API requests without authentication will also fail.

     ```shell
     curl -X GET "https://api.gridics.com/v1/property-record?state_env=fl&address=444%20BRICKELL%20ST&zipCode=33131" \
     -H "x-api-key: YOUR_API_KEY"
     ```
    
     <div class="alert alert-info border-0 rounded-sm alert-dismissible" role="alert">
    Please replace <strong>YOUR_API_KEY</strong>  with the API key found under the Credentials section of your App. 
     </div>
    
     **Invalid API key response**
     ```json
    {
      "status": "ERROR",
      "messages": [
        "Invalid ApiKey"
      ]
    }
     ```

     **Missing API key response**
     ```json
     {
      "status": "ERROR",
      "messages": [
        "Failed to resolve API Key variable request.header.x-api-key"
      ]
    }
     ```

     **Wrong API key response**
     ```json
     {
      "status": "ERROR",
      "messages": [
        "Invalid ApiKey for given resource"
      ]
    }
     ```
    
     # Request Parameters

     The Zoning API allows you to fetch zoning details relevant to parcels in available markets. The fields returned will be determined by which Zoning API you choose to use. 
    
     <div class="alert alert-warning border-0 rounded-sm alert-dismissible" role="alert">
     <span style="color:red;">Required: </span><strong>state_env</strong> + <strong>one other parameter</strong> below are always required.<br>
     <br>
     <strong>Example</strong>: ?state_env=fl&address=123 main street&zipcode=33333<br>
     <br>
     Parameters are case sensitive.
     </div>
    
     | Request Parameters | Details | Example |
     | ------------------ | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | -------------------------------------------------------- |
     | state_env          | <span style="color:red;">*Required: </span><br>**State:** State abbreviation value provided in lowercase format.                                                                                                                                                                              | state_env=fl                                             |
     ||**<span style="color:red;">AND at least one request parameter grouping below is required**</span>||
     | address+zipCode    | **Address + Zip:** Address information should be specified without any units numbers (apt, condo, suite, etc). Zipcode must be provided as a 5 digit value and be a valid USA zipcode.                                                                                                        | address=444 BRICKELL Ave<br>zipCode=33131                |
     | groupId            | **GroupID:** 17 character value generated by Gridics for every parcel.<br>Apply this parameter if you know the **parcel** ID assigned by Gridics.                                                                                                                                             | groupId=296066a795235f372                                |
     | lat+lon            | **Single Map Point (Lat/lon):** Each value needs to be its own parameter and be included with the state_env parameter. To increase the accuracy of results, it is recommended to provide at least 6 digits of precision after a decimal.                                                      | lat=25.769239824444398<br>lon=-80.19044887523829         |
     |                    | **Polygon Search (Area):** The Polygon search uses a different API endpoint and can be found by visiting the Search API documentation.<br><br>A polygon search returns a list of GroupID’s which can then be used with the GroupID request parameter to fetch each parcel's zoning data.      |                                                          |

     # Response Data
    
     Gridics Zoning API returns data according to the API you choose to use. Please visit <a href="https://developer.gridics.com/plans" target="_blank"> API Pricing</a> to view the difference between APIs.

     ## Response Data Summary

     |Summary of fields | Basic | Enhanced | Premium |
     | --- | --- | --- | --- |
     | Address | x | x | x |
     | Zone | x | x | x |
     | Stated Zone Attributes (FAR, Lot Area, Max Height, etc) | x | x | x |
     | Overlays (\*where available) |   | x | x |
     | Uses |   | x | x |
     | Lot Type (Corner, Block, Internal, etc) |   |   | x |
     | Parcel-specific Buildable Capacity (Setbacks, Max Buildable Area, Units Allowed, etc) |   |   | x |
     | Frontages |   |   | x |
     | Geometry |   |   | x |
     |- Base Footprint and Floors |   |   | x |
     |- Base Footprint with Setbacks and Floors with Setbacks |   |   | x |
     |- Building Envelope |   |   | x |

