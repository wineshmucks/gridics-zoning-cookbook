     | Buildings[\*].Envelope.DensityUL                           | Unlimited Residential Density                | Residential Density is unlimited, this is a true/false field.<br>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       | boolean          |                      |
