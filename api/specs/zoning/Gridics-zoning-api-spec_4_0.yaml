     | Buildings[\*].ZoningAllowance.ZoneId                       | Primary Zone                                 | The primary zone label.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 | string           |                      |
     | Buildings[\*].ZoningAllowance.SubZoneId                    | Sub Zone                                     | The sub zone label, which is dependent to the primary zone to create a combination.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     | string           |                      |
     | Buildings[\*].ZoningAllowance.ZoneTypeId                   | Zone Type                                    | The zone type, which is dependent to the primary zone and also to the sub zone, and they create combinations.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           | string           |                      |
     | Buildings[\*].ZoningAllowance.BuildingTypologyId           | Building Typology                            | This id represents a unique Gridics typology utilized in the calculations for this record.<br>A typology is a specific development type allowed within the zoning district, and a district may have multiple typologies allowed. This specific id represents the typology used for the calculations of this record (default typology).                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  | string           |                      |
     | Buildings[\*].ZoningAllowance.ZoningRegulationName         | Zone Regulation Name                         | This is the name of the Zone Regulation which Gridics used to determine the zoning rules to apply.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      | varchar (80)     |                      |
     | Buildings[\*].ZoningAllowance.ZoneCombinationName          | Zone                                         | This is the full Zone combination where we combine Primary Zone, Sub Zone and Zone Type to make it easier to understand the Zone as users would read it. For instance, in Miami, FL a T6-8-O is made up from Primary Zone=T6, Sub zone=8, and Zone Type=Open. People that understand zoning in Miami would know the zone as "T6-8-O"                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    | string           |                      |
     | Buildings[\*].CalibrationGeneral.PFrontSetbackPrincipalMax | Maximum Principal Frontage Setback (Podium)  | Maximum setback dimension for the principal frontage.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   | full integer     | ft                   |
     | Buildings[\*].CalibrationGeneral.PFrontSetbackSecondaryMax | Maximum Secondary Frontage Setback (Podium)  | Maximum setback dimension for the secondary frontage.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   | full integer     | ft                   |
     | Buildings[\*].CalibrationGeneral.PSideSetbackMax           | Maximum Side Setback (Podium)                | Maximum setback dimension for the sides.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                | full integer     | ft                   |
     | Buildings[\*].CalibrationGeneral.PRearSetbackMax           | Maximum Rear Setback (Podium)                | Maximum setback dimension for the rear.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 | full integer     | ft                   |
     | Buildings[\*].Frontages[\*].Label                          | Polygon segment Label                        | The internal label for a specific segment of the polygon.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               | string           |                      |
     | Buildings[\*].Frontages[\*].FrontageType                   | Frontage Types                               | 1 - Primary Frontage, 2- Secondary Frontage                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             | integer          |                      |
     | Buildings[\*].Frontages[\*].Setback                        | Building setback for specific frontage       | The minimum setback required for the specific segment of the polygon.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   | number           |                      |
     | Buildings[\*].Frontages[\*].MinThoroughfareWidth           | Right-of-Way width                           | Applicable to primary and secondary frontages, is the width of the right-of-way, or the distance between the specific segment of the polygon and another property across the street.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    | number           |                      |
     | Buildings[\*].Frontages[\*].SegmentsLengths                | Frontage dimension                           | The dimension (in feet) of the specific segment of the polygon.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         | array of number  |                      |
     | Buildings[\*].UsesStatistic                                | Allowed Use Statistics                       |                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         | object           |                      |
     | CalculationStatus                                          | Calculation Status                           | Shows the Calculation status of each Property Record for the selected Zoning Code Version. It is calculated as Status which most often occurs for buildings related to this Property Record and Zoning Code Version.<br>Values:<br>0 - NONE - not yet calculated<br>1 - OK - has calculation result<br>2 - EMPTY_RESPONSE - project was not calculated because the "Zoning Service" returned an empty response or error<br>3 - NO_BUILDINGS - project was calculated but does not contain developments and/or buildings<br>4 - TIMEOUT - calculations took too long (more that 1 minute)<br>5 - ERROR - Service returns an unhandled error with status 500<br>6 - NOT_SAVED - data was not saved because of an incorrect structure or data type<br>7 - WITH_NOTIFICATIONS - calculation result contains Error Notifications<br>8 - INCORRECT_PARAMETERS - calculation failed due to inapplicable calculation parameters | integer          |                      |

     ## Response codes
    
     | Status Code                        | Description                                                                                       |
     | ---------------------------------- | ------------------------------------------------------------------------------------------------- | 
     | 200 - OK                           | Everything worked as expected.                                                                    |
     | 400 - Bad Request                  | The request was unacceptable, often due to missing a required parameter.                          |
     | 401 - Unauthorized                 | No valid API key provided.                                                                        |
     | 404 - Not Found                    | The requested resource doesn't exist.                                                             |
     | 429 - Too Many Requests            | Too many requests hit the API too quickly. We recommend an exponential backoff of your requests.  |
     | 500, 502, 503, 504 - Server Errors | Something went wrong on Gridics API’s end. (These are rare.)                                      |

     # API examples

     # Try It Out
     <div class="auth-panel"><div class="clearfix"></div></div>

servers:
  - url: https://api.gridics.com/v1
    description: Production server


components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
security:
  - ApiKeyAuth: []

paths:
  /property-record:
    get:
      summary: Get a property by address
      responses:
        '200':
          description: Successful response
      security:
        - ApiKeyAuth: [ ]
      parameters:
        - name: state_env
          in: query
          description: State abbreviation value provided in lowercase format. This is a requied paramater for all filter options listed below.
          required: true
          schema:
            type: string
            example: "fl"
        - name: address
          in: query
          description: Address information should be specified without any units numbers (apt, condo, suite, etc). Can be used only in combination with state_env and zipCode filters.
          required: false
          schema:
            type: string
            example: "444 BRICKELL AVE"
        - name: zipCode
          in: query
          description: Zipcode must be provided as a 5 digit value and be a valid USA zipcode. Can be used only in combination with state_env and address filters.
          required: false
          schema:
            type: string
            example: "33131"
      x-code-samples:
        - lang: shell
          label: cURL
          source: |
            curl -X GET "https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131" -H "x-api-key: {x-api-key}"
        - lang: php
          label: PHP
          source: |
            <?php

            $ch = curl_init($url);
            curl_setopt_array($ch, array(
              CURLOPT_URL => 'https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131',
              CURLOPT_RETURNTRANSFER => true,
              CURLOPT_ENCODING => '',
              CURLOPT_MAXREDIRS => 10,
              CURLOPT_TIMEOUT => 0,
              CURLOPT_FOLLOWLOCATION => false,
              CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
              CURLOPT_CUSTOMREQUEST => 'GET',
              CURLOPT_HTTPHEADER => array(
              'x-api-key: {{x-api-key}}'
              ),
            ));

            $response = curl_exec($ch);

            if(curl_errno($ch)){
              echo 'Curl error: ' . curl_error($ch);
            }

            curl_close($ch);

            echo $response;
        - lang: go
          label: Go
          source: |
            package main

            import (
              "fmt"
              "net/http"
              "io/ioutil"
            )

            func main() {

              url := "https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131"
              method := "GET"

              client := &http.Client {
              }
              req, err := http.NewRequest(method, url, nil)

              if err != nil {
                fmt.Println(err)
                return
              }
              req.Header.Add("x-api-key", "{x-api-key}")

              res, err := client.Do(req)
              if err != nil {
                fmt.Println(err)
                return
              }
              defer res.Body.Close()

              body, err := ioutil.ReadAll(res.Body)
              if err != nil {
                fmt.Println(err)
                return
              }
              fmt.Println(string(body))
            }
        - lang: c_
          label: C#
          source: |
            var client = new HttpClient(new HttpClientHandler
            {
              AllowAutoRedirect = false,
            });
            var request = new HttpRequestMessage(HttpMethod.Get, "https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131");
            request.Headers.Add("x-api-key", "{x-api-key}");
            var response = await client.SendAsync(request);
            response.EnsureSuccessStatusCode();
            Console.WriteLine(await response.Content.ReadAsStringAsync());
        - lang: java
          label: Java
          source: |
            OkHttpClient client = new OkHttpClient().newBuilder()
              .build();
            MediaType mediaType = MediaType.parse("text/plain");
            RequestBody body = RequestBody.create(mediaType, "");
            Request request = new Request.Builder()
              .url("https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131")
              .method("GET", body)
              .addHeader("x-api-key", "{x-api-key}")
              .build();
            Response response = client.newCall(request).execute();
        - lang: python
          label: Python
          source: |
            import http.client

            conn = http.client.HTTPSConnection("api.gridics.com")
            payload = ''
            headers = {
              'x-api-key': '{x-api-key}'
            }
            conn.request("GET", "/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131", payload, headers)
            res = conn.getresponse()
            data = res.read()
            print(data.decode("utf-8"))
        - lang: ruby
          label: Ruby
          source: |
            require "uri"
            require "net/http"

            url = URI("https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131")

            https = Net::HTTP.new(url.host, url.port)
            https.use_ssl = true

            request = Net::HTTP::Get.new(url)
            request["x-api-key"] = "{x-api-key}"

            response = https.request(request)
            puts response.read_body
        - lang: node_js
          label: Node.js
          source: |
            const axios = require('axios');

            let config = {
              method: 'get',
              maxBodyLength: Infinity,
              url: 'https://api.gridics.com/v1/property-record?state_env=fl&address=444 BRICKELL AVE&zipCode=33131',
              headers: {
                'x-api-key': '{x-api-key}'
              }
            };

            axios.request(config)
            .then((response) => {
              console.log(JSON.stringify(response.data));
            })
            .catch((error) => {
              console.log(error);
            });
