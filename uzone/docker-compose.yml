services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uzone}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uzone"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      UZONE_DATABASE_URL: ${UZONE_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/uzone}
      UZONE_ALLOWED_ORIGINS: ${UZONE_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      UZONE_AUTH_PROVIDER: ${UZONE_AUTH_PROVIDER:-local}
      UZONE_PAYMENT_PROVIDERS: ${UZONE_PAYMENT_PROVIDERS:-manual}
      UZONE_DEFAULT_PAYMENT_PROVIDER: ${UZONE_DEFAULT_PAYMENT_PROVIDER:-manual}
      UZONE_EMAIL_PROVIDER: ${UZONE_EMAIL_PROVIDER:-console}
      UZONE_EMAIL_FROM: ${UZONE_EMAIL_FROM:-noreply@uzone.local}
      UZONE_ARTIFACTS_DIR: ${UZONE_ARTIFACTS_DIR:-/app/artifacts}
      UZONE_CLERK_PEM_PUBLIC_KEY: ${UZONE_CLERK_PEM_PUBLIC_KEY:-}
      UZONE_CLERK_JWKS_URL: ${UZONE_CLERK_JWKS_URL:-https://api.clerk.com/v1/jwks}
      UZONE_CLERK_AUTHORIZED_PARTIES: ${UZONE_CLERK_AUTHORIZED_PARTIES:-http://localhost:3001,http://127.0.0.1:3001}
      UZONE_STRIPE_SECRET_KEY: ${UZONE_STRIPE_SECRET_KEY:-}
      UZONE_STRIPE_WEBHOOK_SECRET: ${UZONE_STRIPE_WEBHOOK_SECRET:-}
      UZONE_RESEND_API_KEY: ${UZONE_RESEND_API_KEY:-}
      UZONE_POSTMARK_SERVER_TOKEN: ${UZONE_POSTMARK_SERVER_TOKEN:-}
      UZONE_DEV_RELOAD: ${UZONE_DEV_RELOAD:-true}
      UZONE_RUN_MIGRATIONS: ${UZONE_RUN_MIGRATIONS:-true}
      UZONE_RUN_SEED_DATA: ${UZONE_RUN_SEED_DATA:-true}
    ports:
      - "8000:8000"
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    volumes:
      - ./backend:/app
      - backend_artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      UZONE_API_BASE: http://backend:8000
      NEXT_PUBLIC_UZONE_API_BASE: ${NEXT_PUBLIC_UZONE_API_BASE:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  postgres_data:
  backend_artifacts:
  frontend_node_modules:
  frontend_next:
